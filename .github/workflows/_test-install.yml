name: Test Install from Index (Reusable)

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'JSON array of Python versions to test'
        required: true
        type: string
      version:
        description: 'Package version to install'
        required: true
        type: string
      index-url:
        description: 'Package index URL'
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJson(inputs.python-versions) }}

    steps:
      - uses: actions/checkout@v4
        with:
          path: repo

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Compile test eBPF programs
        run: make -C repo compile

      - name: Install and test
        env:
          VERSION: ${{ inputs.version }}
          INDEX_URL: ${{ inputs.index-url }}
        run: |
          uv venv --quiet --python ${{ matrix.python-version }}
          uv pip install --quiet "tinybpf==$VERSION" pytest \
            --extra-index-url "$INDEX_URL"
          sudo .venv/bin/pytest repo/tests/ -v --tb=short
